name: quotation

services:
  quote-service:
    build:
      context: ./quote-service
      dockerfile: Dockerfile
    volumes:
      - ./quote-service/data:/app/data
    expose:
      - "8080"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8888:80"
    depends_on:
      - quote-service
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
